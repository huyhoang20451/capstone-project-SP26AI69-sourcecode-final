services:
  db:
    image: postgres:16-alpine
    container_name: web-emotion-chat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: web_emotion_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Hoang399100
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d web_emotion_chat"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: web-emotion-chat-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  server:
    build:
      context: .
    container_name: web-emotion-chat-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:Hoang399100@db:5432/web_emotion_chat
      OLLAMA_BASE_URL: http://ollama:11434
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-tamly-model-withoutemotion}
      PHOBERT_MULTITASK_MODEL_ID: ${PHOBERT_MULTITASK_MODEL_ID:-}
      WHISPER_MODEL_ID: ${WHISPER_MODEL_ID:-}
      HF_HOME: /root/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface

volumes:
  postgres_data:
  ollama_data:
  hf_cache:

