<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mental Health Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        /* Tùy chỉnh thanh cuộn cho giống ChatGPT */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="bg-[#f9f9f9] h-screen flex overflow-hidden font-sans text-gray-800">

    <div class="hidden md:flex w-64 bg-[#202123] text-white flex-col p-3 transition-all">
        <button id="new-chat-btn" class="border border-gray-600 rounded-md p-3 text-sm flex items-center gap-3 hover:bg-gray-700 transition mb-4">
            <i class="fa-solid fa-plus"></i> Cuộc hội thoại mới
        </button>
        <div class="flex-1 overflow-y-auto space-y-2 text-sm" id="history-list">
            <div class="px-3 py-2 text-gray-500 text-xs font-bold uppercase">Lịch sử</div>
        </div>
        <div class="border-t border-gray-600 pt-3">
            <div class="flex items-center gap-3 p-3 hover:bg-gray-700 rounded-md cursor-pointer transition">
                <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center font-bold text-xs">H</div>
                <span class="text-sm">Annonymous (Pro)</span>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full bg-white relative">
        
        <header class="h-14 border-b flex items-center justify-between px-6 bg-white/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <span class="font-bold text-gray-800">AI Counselor</span>
                {% if models %}
                <div class="relative">
                    <select id="model-select" class="appearance-none bg-gray-100 border border-gray-200 text-gray-700 py-1 px-3 pr-8 rounded-lg text-xs font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                        {% for model in models %}
                        <option value="{{ model.name }}">{{ model.name }}</option>
                        {% endfor %}
                    </select>
                    <select id="model-classify-select" class="appearance-none bg-gray-100 border border-gray-200 text-gray-700 py-1 px-3 pr-8 rounded-lg text-xs font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                        <option value="default">Chọn mô hình phân loại</option>
                        {% for emotion_model in emotion_models %}
                        <option value="{{ emotion_model }}">{{ emotion_model }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
                        <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </div>
                </div>
                {% endif %}
            </div>
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-share-nodes text-gray-400 cursor-pointer hover:text-indigo-600 transition"></i>
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-8 scroll-smooth">
            <div class="flex gap-4 max-w-3xl mx-auto">
                <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white shrink-0 shadow-sm">
                    <i class="fa-solid fa-robot text-xs"></i>
                </div>
                <div class="space-y-2">
                    <p class="leading-relaxed text-gray-700">Chào bạn, mình luôn ở đây để lắng nghe những tâm tư của bạn. Hôm nay bạn cảm thấy thế nào?</p>
                </div>
            </div>
        </div>

        <div class="p-4 md:p-8 bg-gradient-to-t from-white via-white to-transparent">
            <div class="max-w-3xl mx-auto relative group">
                <textarea id="user-input" rows="1" 
                    class="w-full p-4 pr-12 border border-gray-200 rounded-2xl shadow-md focus:shadow-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none resize-none overflow-hidden bg-white transition-all"
                    placeholder="Nhắn tin cho Trợ lý tâm lý..." oninput="autoResize(this)"></textarea>
                <button onclick="handleSend()" 
                    class="absolute right-3 bottom-3 w-9 h-9 bg-indigo-600 text-white rounded-xl flex items-center justify-center hover:bg-indigo-700 transition-transform active:scale-90 shadow-md">
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
                <div class="mt-3 flex items-center justify-between gap-3">
                    <button id="mic-toggle-btn" type="button" class="inline-flex items-center gap-2 px-3 py-2 rounded-xl border border-gray-200 bg-white text-gray-700 hover:bg-gray-50 transition">
                        <i class="fa-solid fa-microphone text-xs"></i>
                        <span class="text-xs font-medium">Micro</span>
                    </button>
                    <div id="stt-status" class="text-[11px] text-gray-500">Speech-to-Text: chưa bật</div>
                </div>
                <p class="text-[10px] text-gray-400 text-center mt-3 italic">Mô hình AI đang được finetune cho Capstone - Hãy chia sẻ thật lòng bạn nhé.</p>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const modelSelect = document.getElementById('model-select');
        const classifyModelSelect = document.getElementById('model-classify-select');
        const historyList = document.getElementById('history-list');
        const newChatBtn = document.getElementById('new-chat-btn');
        const micToggleBtn = document.getElementById('mic-toggle-btn');
        const sttStatus = document.getElementById('stt-status');
        let activeConversationId = null;
        let sttListening = false;
        let sttRecorder = null;
        let sttStream = null;
        let sttChunks = [];
        let ws = null;
        let wsReady = false;

        const welcomeMessageHtml = `
            <div class="flex gap-4 max-w-3xl mx-auto">
                <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white shrink-0 shadow-sm">
                    <i class="fa-solid fa-robot text-xs"></i>
                </div>
                <div class="space-y-2">
                    <p class="leading-relaxed text-gray-700">Chào bạn, mình luôn ở đây để lắng nghe những tâm tư của bạn. Hôm nay bạn cảm thấy thế nào?</p>
                </div>
            </div>
        `;

        function escapeHtml(value) {
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderMarkdown(text) {
            const source = typeof text === 'string' ? text : '';

            if (window.marked && window.DOMPurify) {
                marked.setOptions({ breaks: true, gfm: true });
                const unsafeHtml = marked.parse(source);
                return DOMPurify.sanitize(unsafeHtml);
            }

            return escapeHtml(source).replace(/\n/g, '<br>');
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function setSttStatus(text, isActive = false) {
            if (!sttStatus) return;
            sttStatus.textContent = text;
            sttStatus.classList.toggle('text-emerald-600', isActive);
            sttStatus.classList.toggle('text-gray-500', !isActive);
        }

        function updateMicButtonState() {
            if (!micToggleBtn) return;
            micToggleBtn.classList.toggle('bg-rose-50', sttListening);
            micToggleBtn.classList.toggle('border-rose-200', sttListening);
            micToggleBtn.classList.toggle('text-rose-700', sttListening);
            micToggleBtn.classList.toggle('bg-white', !sttListening);
            micToggleBtn.classList.toggle('border-gray-200', !sttListening);
            micToggleBtn.classList.toggle('text-gray-700', !sttListening);
            micToggleBtn.innerHTML = sttListening
                ? '<i class="fa-solid fa-stop text-xs"></i><span class="text-xs font-medium">Dừng micro</span>'
                : '<i class="fa-solid fa-microphone text-xs"></i><span class="text-xs font-medium">Micro</span>';
        }

        function appendTranscriptChunk(text) {
            if (!text || typeof text !== 'string') return;
            const base = userInput.value.trim();
            userInput.value = base ? `${base} ${text.trim()}` : text.trim();
            autoResize(userInput);
        }

        function detectAudioExtension(mimeType) {
            const type = (mimeType || '').toLowerCase();
            if (type.includes('wav')) return 'wav';
            if (type.includes('mpeg') || type.includes('mp3')) return 'mp3';
            if (type.includes('ogg')) return 'ogg';
            if (type.includes('mp4') || type.includes('m4a')) return 'm4a';
            return 'webm';
        }

        function releaseSttResources() {
            if (sttStream) {
                sttStream.getTracks().forEach((track) => track.stop());
            }
            sttRecorder = null;
            sttStream = null;
            sttChunks = [];
        }

        async function transcribeRecordedAudio() {
            try {
                if (!sttChunks.length) {
                    setSttStatus('Speech-to-Text: không có dữ liệu âm thanh');
                    return;
                }

                const mimeType = sttRecorder?.mimeType || 'audio/webm';
                const extension = detectAudioExtension(mimeType);
                const blob = new Blob(sttChunks, { type: mimeType });
                const formData = new FormData();
                formData.append('file', blob, `voice.${extension}`);

                setSttStatus('Speech-to-Text: đang xử lý...');

                const response = await fetch('/api/voice/transcribe', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                if (response.ok && result.status === 'success') {
                    const transcriptText = (result.text || '').trim();
                    if (!transcriptText) {
                        setSttStatus('Speech-to-Text: không nhận dạng được nội dung');
                        return;
                    }

                    userInput.value = transcriptText;
                    autoResize(userInput);
                    setSttStatus('Speech-to-Text: nhận dạng xong, đang gửi lên LLM...', true);
                    await handleSend();
                    setSttStatus('Speech-to-Text: đã gửi lên chat');
                } else {
                    setSttStatus(`Speech-to-Text lỗi: ${result.message || 'Không rõ lỗi'}`);
                }
            } catch (error) {
                setSttStatus('Speech-to-Text: lỗi kết nối server');
            } finally {
                releaseSttResources();
            }
        }

        async function startSttCapture() {
            if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
                setSttStatus('Speech-to-Text: trình duyệt không hỗ trợ ghi âm');
                return;
            }

            let stream;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (error) {
                setSttStatus('Speech-to-Text: chưa có quyền truy cập micro');
                return;
            }

            const preferredTypes = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/mp4',
                'audio/ogg;codecs=opus'
            ];
            const selectedType = preferredTypes.find((type) => MediaRecorder.isTypeSupported(type)) || '';

            sttChunks = [];
            sttStream = stream;
            sttRecorder = selectedType ? new MediaRecorder(stream, { mimeType: selectedType }) : new MediaRecorder(stream);

            sttRecorder.ondataavailable = (event) => {
                if (event.data && event.data.size > 0) {
                    sttChunks.push(event.data);
                }
            };

            sttRecorder.onstop = () => {
                transcribeRecordedAudio();
            };

            sttRecorder.start();
            sttListening = true;
            updateMicButtonState();
            setSttStatus('Speech-to-Text: đang lắng nghe...', true);
            window.dispatchEvent(new CustomEvent('stt:start'));
        }

        function stopSttCapture() {
            sttListening = false;
            updateMicButtonState();
            setSttStatus('Speech-to-Text: đang gửi audio...');

            if (sttRecorder && sttRecorder.state !== 'inactive') {
                sttRecorder.stop();
            } else {
                releaseSttResources();
                setSttStatus('Speech-to-Text: đã dừng');
            }

            window.dispatchEvent(new CustomEvent('stt:stop'));
        }

        function resetChatWindow() {
            chatWindow.innerHTML = welcomeMessageHtml;
        }

        function setActiveHistoryItem(activeElement) {
            const items = historyList.querySelectorAll('[data-history-id]');
            items.forEach((item) => {
                item.classList.remove('bg-[#4a4b59]');
                item.classList.add('bg-[#343541]');
            });
            if (activeElement) {
                activeElement.classList.remove('bg-[#343541]');
                activeElement.classList.add('bg-[#4a4b59]');
            }
        }

        function formatHistoryTime(value) {
            if (!value) return '';
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) return '';
            return parsed.toLocaleString('vi-VN', {
                hour: '2-digit',
                minute: '2-digit',
                day: '2-digit',
                month: '2-digit'
            });
        }

        async function loadHistoryDetail(chatId, element) {
            try {
                const response = await fetch(`/api/history/${chatId}`);
                const detail = await response.json();

                if (!response.ok || detail.status === 'error') {
                    appendMessage('bot', 'Không thể tải chi tiết hội thoại.');
                    return;
                }

                chatWindow.innerHTML = '';
                const cosineByMessageId = new Map(
                    (Array.isArray(detail.cosine_similarities) ? detail.cosine_similarities : [])
                        .map((item) => [item.message_id, item.emotion_similarity])
                );

                (detail.messages || []).forEach((msg) => {
                    if (msg.role === 'user') {
                        appendMessage('user', msg.content || '');
                        return;
                    }

                    appendMessage('bot', msg.content || '', {
                        llmEmotion: msg.llm_emotion || msg.emotion || null,
                        mlEmotion: msg.ml_emotion || msg.ml_detail_emotion || null,
                        mlDetailEmotion: msg.ml_detail_emotion || msg.ml_emotion || null,
                        emotionModelUsed: msg.emotion_model_used || 'Machine Learning',
                    });
                });

                activeConversationId = chatId;
                setActiveHistoryItem(element);
            } catch (error) {
                appendMessage('bot', 'Lỗi kết nối khi tải lịch sử chi tiết.');
            }
        }

        async function deleteHistory(chatId) {
            try {
                const response = await fetch(`/api/history/${chatId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (!response.ok || result.status === 'error') {
                    appendMessage('bot', 'Không thể xóa hội thoại đã chọn.');
                    return;
                }

                if (activeConversationId === chatId) {
                    activeConversationId = null;
                    resetChatWindow();
                }

                await loadHistoryList();
            } catch (error) {
                appendMessage('bot', 'Lỗi kết nối khi xóa hội thoại.');
            }
        }

        function renderHistoryItems(items) {
            if (!historyList) return;
            historyList.querySelectorAll('[data-history-id]').forEach((node) => node.remove());

            items.forEach((item) => {
                const historyItem = document.createElement('button');
                historyItem.type = 'button';
                historyItem.dataset.historyId = String(item.id);
                historyItem.className = 'group/history w-full text-left p-3 bg-[#343541] rounded-md cursor-pointer hover:bg-[#4a4b59] transition';
                historyItem.innerHTML = `<div class="flex items-start justify-between gap-2">
                        <div class="min-w-0">
                            <p class="truncate"><i class="fa-regular fa-message mr-2"></i>${escapeHtml(item.title || 'Không tiêu đề')}</p>
                            <p class="text-[10px] text-gray-400 mt-1">${escapeHtml(formatHistoryTime(item.time))}</p>
                        </div>
                        <span class="delete-history-btn opacity-0 group-hover/history:opacity-100 text-gray-400 hover:text-rose-400 transition" data-delete-id="${item.id}" title="Xóa hội thoại">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </span>
                    </div>`;
                historyItem.addEventListener('click', () => loadHistoryDetail(item.id, historyItem));

                const deleteBtn = historyItem.querySelector('.delete-history-btn');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', async (event) => {
                        event.preventDefault();
                        event.stopPropagation();
                        await deleteHistory(item.id);
                    });
                }

                if (activeConversationId === item.id) {
                    historyItem.classList.remove('bg-[#343541]');
                    historyItem.classList.add('bg-[#4a4b59]');
                }

                historyList.appendChild(historyItem);
            });
        }

        async function loadHistoryList() {
            try {
                const response = await fetch('/api/history');
                const historyData = await response.json();
                if (Array.isArray(historyData)) {
                    renderHistoryItems(historyData);
                }
            } catch (error) {
                // Keep UI usable even if history API is temporarily unavailable.
            }
        }

        // Nhấn Enter để gửi
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        function buildEmotionSection(emotionMeta) {
            const llmEmotion = emotionMeta?.llmEmotion;
            const mlEmotion = emotionMeta?.mlEmotion;
            const mlDetailEmotion = emotionMeta?.mlDetailEmotion;
            const reliabilityScore = emotionMeta?.reliabilityScore;
            const emotionModelUsed = emotionMeta?.emotionModelUsed || 'Machine Learning';

            const hasLLMEmotion = llmEmotion && llmEmotion !== 'Không xác định' && !llmEmotion.includes('dữ liệu');
            const hasMLEmotion = mlEmotion && mlEmotion !== 'Không xác định';

            if (!hasLLMEmotion && !hasMLEmotion) {
                return '';
            }

            return `<div class="flex items-center gap-2">
                    ${hasMLEmotion ? `<div class="inline-flex items-center gap-2 px-2.5 py-0.5 rounded-full font-medium bg-sky-100 text-sky-800 border border-sky-200">
                        <i class="fa-solid fa-brain text-[10px]"></i>
                        <span>${emotionModelUsed}: ${mlDetailEmotion}</span>
                    </div>` : ''}
                    ${reliabilityScore !== null && reliabilityScore !== undefined && reliabilityScore !== 1.0 ? `<div class="inline-flex items-center gap-2 px-2.5 py-0.5 rounded-full font-medium bg-gray-100 text-gray-700 border border-gray-200">
                        <i class="fa-solid fa-shield-heart text-[10px]"></i>
                        <span>Độ tin cậy: ${(reliabilityScore * 100).toFixed(0)}%</span>
                    </div>` : ''}
                </div>`;
        }

        function createStreamingBotMessage() {
            const id = 'stream-' + Date.now();
            const html = `
                <div class="flex gap-4 max-w-3xl mx-auto animate-fade-in group" id="${id}">
                    <div class="w-8 h-8 rounded-full bg-emerald-500 shadow-emerald-100 flex items-center justify-center text-white shrink-0 shadow-md">
                        <i class="fa-solid fa-robot text-xs"></i>
                    </div>
                    <div class="space-y-3 w-full">
                        <div class="font-bold text-[10px] text-gray-400 uppercase tracking-widest flex justify-between">
                            <span>AI Assistant</span>
                        </div>
                        <div class="emotion-meta"></div>
                        <div class="stream-content leading-relaxed text-[15px] text-gray-700 bg-gray-50 p-3 rounded-2xl rounded-tl-none border border-gray-100"></div>
                    </div>
                </div>
            `;

            chatWindow.insertAdjacentHTML('beforeend', html);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });

            const root = document.getElementById(id);
            return {
                root,
                metaEl: root.querySelector('.emotion-meta'),
                contentEl: root.querySelector('.stream-content')
            };
        }

        function updateStreamingBotMessage(streamNode, text) {
            if (!streamNode?.contentEl) return;
            streamNode.contentEl.innerHTML = renderMarkdown(text || '');
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function finalizeStreamingBotMessage(streamNode, text, emotionMeta = null) {
            if (!streamNode) return;
            updateStreamingBotMessage(streamNode, text || '');

            if (streamNode.metaEl) {
                streamNode.metaEl.innerHTML = buildEmotionSection(emotionMeta || {});
            }
        }

        function connectWebSocket() {
            return new Promise((resolve) => {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws/chat`;
                
                try {
                    ws = new WebSocket(wsUrl);
                    ws.onopen = () => {
                        wsReady = true;
                        console.log('✅ WebSocket kết nối thành công');
                        resolve(true);
                    };
                    ws.onerror = (error) => {
                        console.error('❌ WebSocket lỗi:', error);
                        wsReady = false;
                        resolve(false);
                    };
                    ws.onclose = () => {
                        console.log('WebSocket đóng');
                        wsReady = false;
                    };
                } catch (error) {
                    console.error('❌ Lỗi tạo WebSocket:', error);
                    wsReady = false;
                    resolve(false);
                }
            });
        }

        async function handleSend() {
            const message = userInput.value.trim();
            const selectedModel = modelSelect ? modelSelect.value : null;
            const selectedEmotionModel = classifyModelSelect ? classifyModelSelect.value : 'default';

            if (!message) return;

            appendMessage('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';

            const loadingId = addLoading();
            let streamNode = null;
            let streamedText = '';
            let donePayload = null;

            try {
                // Kiểm tra kết nối WebSocket, nếu chưa có thì tạo mới
                if (!wsReady) {
                    const connected = await connectWebSocket();
                    if (!connected) {
                        throw new Error('Không thể kết nối đến server qua WebSocket.');
                    }
                }

                // Thiết lập message handler cho phản hồi
                let messageHandler = null;
                const messagePromise = new Promise((resolve) => {
                    messageHandler = (event) => {
                        try {
                            const payload = JSON.parse(event.data);
                            
                            if (payload.type === 'chunk') {
                                streamedText += payload.content || '';
                                updateStreamingBotMessage(streamNode, streamedText);
                                return;
                            }

                            if (payload.type === 'error') {
                                throw new Error(payload.message || 'Lỗi từ server.');
                            }

                            if (payload.type === 'done') {
                                donePayload = payload.data || {};
                                ws.removeEventListener('message', messageHandler);
                                resolve();
                            }
                        } catch (error) {
                            console.error('Lỗi parse WebSocket message:', error);
                        }
                    };
                    ws.addEventListener('message', messageHandler);
                });

                removeLoading(loadingId);
                streamNode = createStreamingBotMessage();

                // Gửi message qua WebSocket
                ws.send(JSON.stringify({
                    message: message,
                    model: selectedModel,
                    emotion_model: selectedEmotionModel,
                    conversation_id: activeConversationId
                }));

                // Chờ cho đến khi nhận được phản hồi cuối
                await messagePromise;

                if (!donePayload) {
                    finalizeStreamingBotMessage(streamNode, streamedText || '');
                    return;
                }

                const advice = donePayload.advice || streamedText || '';
                const llmEmotion = donePayload.show_emotion ? (donePayload.llm_emotion ?? donePayload.emotion) : null;
                const mlEmotion = donePayload.ml_emotion ?? null;
                const mlDetailEmotion = donePayload.ml_detail_emotion ?? null;
                const reliabilityScore = donePayload.reliability_score;
                const emotionModelUsed = donePayload.emotion_model_used ?? 'Machine Learning';

                finalizeStreamingBotMessage(streamNode, advice, {
                    llmEmotion,
                    mlEmotion,
                    mlDetailEmotion,
                    reliabilityScore,
                    emotionModelUsed
                });

                if (Number.isInteger(donePayload.history_id)) {
                    activeConversationId = donePayload.history_id;
                }

                loadHistoryList();
            } catch (error) {
                removeLoading(loadingId);
                if (streamNode) {
                    finalizeStreamingBotMessage(streamNode, streamedText || '');
                }
                appendMessage('bot', `Rất tiếc, đã có lỗi kết nối đến server. ${error.message || 'Bạn kiểm tra lại backend nhé!'}`);
                // Đóng kết nối WebSocket lỗi, sẽ tạo lại lần sau
                if (ws) {
                    ws.close();
                    ws = null;
                    wsReady = false;
                }
            }
        }

        function appendMessage(role, text, emotionMeta = null) {
            const isBot = role === 'bot';
            const renderedText = isBot ? renderMarkdown(text) : escapeHtml(text).replace(/\n/g, '<br>');
            const emotionSection = isBot ? buildEmotionSection(emotionMeta || {}) : '';

            const html = `
                <div class="flex gap-4 max-w-3xl mx-auto animate-fade-in group">
                    <div class="w-8 h-8 rounded-full ${isBot ? 'bg-emerald-500 shadow-emerald-100' : 'bg-indigo-600 shadow-indigo-100'} flex items-center justify-center text-white shrink-0 shadow-md">
                        <i class="fa-solid ${isBot ? 'fa-robot' : 'fa-user'} text-xs"></i>
                    </div>
                    <div class="space-y-3 w-full">
                        <div class="font-bold text-[10px] text-gray-400 uppercase tracking-widest flex justify-between">
                            <span>${isBot ? 'AI Assistant' : 'Bạn'}</span>
                        </div>
                        ${emotionSection}
                        <div class="leading-relaxed text-[15px] text-gray-700 bg-gray-50 p-3 rounded-2xl ${isBot ? 'rounded-tl-none' : 'rounded-tr-none'} border border-gray-100">
                            ${renderedText}
                        </div>
                    </div>
                </div>
            `;

            chatWindow.insertAdjacentHTML('beforeend', html);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function addLoading() {
            const id = 'loading-' + Date.now();
            const html = `
                <div id="${id}" class="flex gap-4 max-w-3xl mx-auto animate-pulse">
                    <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-white shrink-0">
                        <i class="fa-solid fa-ellipsis text-xs"></i>
                    </div>
                    <div class="space-y-2">
                        <div class="h-3 bg-gray-200 w-24 rounded"></div>
                        <div class="h-10 bg-gray-100 w-64 rounded-2xl"></div>
                    </div>
                </div>`;

            chatWindow.insertAdjacentHTML('beforeend', html);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        if (micToggleBtn) {
            micToggleBtn.addEventListener('click', async () => {
                if (sttListening) {
                    stopSttCapture();
                } else {
                    await startSttCapture();
                }
            });
            updateMicButtonState();
        }

        window.addEventListener('stt:transcript', (event) => {
            const text = event?.detail?.text;
            if (!text || typeof text !== 'string') return;
            userInput.value = text.trim();
            autoResize(userInput);
            handleSend();
        });

        if (newChatBtn) {
            newChatBtn.addEventListener('click', () => {
                activeConversationId = null;
                setActiveHistoryItem(null);
                resetChatWindow();
            });
        }

        // Khởi tạo WebSocket khi trang load
        connectWebSocket();
        loadHistoryList();
    </script>
</body>
</html>
